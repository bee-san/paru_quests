name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.1.0"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Test
        run: ./gradlew --no-daemon test

      - name: Build APK
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] ||
             [ -z "$ANDROID_KEYSTORE_PASSWORD" ] ||
             [ -z "$ANDROID_KEY_ALIAS" ] ||
             [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "All signing secrets are required for installable update APKs." >&2
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.jks
          ./gradlew --no-daemon assembleRelease \
            -Pandroid.injected.signing.store.file="$PWD/release.jks" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Checksums
        run: |
          cd app/build/outputs/apk/release
          for apk in *.apk; do
            sha256sum "$apk" > "$apk.sha256"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/*.sha256
